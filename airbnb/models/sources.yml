sources:
  - name: airbnb
    schema: raw
    tables:
      - name: listings
        identifier: raw_listings
        columns:
          - name: room_type
            tests: 
              - dbt_expectations.expect_column_distinct_count_to_equal:
                  value: 4
                  
          - name: price
            data_tests:
              - dbt_expectations.expect_column_values_to_match_regex:
                  arguments:
                    regex: "^\\\\$[0-9][0-9\\\\.]+$"

      - name: hosts
        identifier: raw_hosts

      - name: reviews
        identifier: raw_reviews
        config:
          loaded_at_field: date
          freshness: 
            warn_after: {count: 1, period: hour} #If the most recent record in the table is older than 1 hour then warning
            error_after: {count: 24, period: hour} #If the most recent record in the table is older than 24 hours then error
            #to check freshness before executing dbt run, execute : dbt source freshness. , to get exit code execute : echo $?
            